services:
  core-api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: runtime
    command: ["pnpm", "--filter", "@asashiki/core-api", "start"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      CORE_API_HOST: ${CORE_API_HOST:-0.0.0.0}
      CORE_API_PORT: ${CORE_API_PORT:-4100}
      CORE_API_DB_PATH: ${CORE_API_DB_PATH:-/data/core-api.sqlite}
      ASASHIKI_ARCHIVE_ROOT: ${ASASHIKI_ARCHIVE_ROOT:-/archive}
      ASASHIKI_DIARY_DIR: ${ASASHIKI_DIARY_DIR:-}
      ADMIN_PANEL_TOKEN: ${ADMIN_PANEL_TOKEN:-}
      REMOTE_MCP_SERVERS_JSON: ${REMOTE_MCP_SERVERS_JSON:-}
      SUPABASE_MCP_ACCESS_TOKEN: ${SUPABASE_MCP_ACCESS_TOKEN:-}
      SUPABASE_TIME_LOG_URL: ${SUPABASE_TIME_LOG_URL:-}
      SUPABASE_TIME_LOG_BEARER_TOKEN: ${SUPABASE_TIME_LOG_BEARER_TOKEN:-}
      SUPABASE_TIME_LOG_NAME: ${SUPABASE_TIME_LOG_NAME:-Supabase 时间日志}
      DEVICE_TOKENS_JSON: ${DEVICE_TOKENS_JSON:-}
      IOS_PROBE_TOKEN: ${IOS_PROBE_TOKEN:-}
      OKX_API_KEY: ${OKX_API_KEY:-}
      OKX_SECRET_KEY: ${OKX_SECRET_KEY:-}
      OKX_PASSPHRASE: ${OKX_PASSPHRASE:-}
      STEAM_API_KEY: ${STEAM_API_KEY:-}
      STEAM_USER_ID: ${STEAM_USER_ID:-}
      WEATHER_LATITUDE: ${WEATHER_LATITUDE:-30.75}
      WEATHER_LONGITUDE: ${WEATHER_LONGITUDE:-120.75}
      WEATHER_LOCATION_NAME: ${WEATHER_LOCATION_NAME:-嘉兴}
      MINIMAX_API_KEY: ${MINIMAX_API_KEY:-}
      MINIMAX_VOICE_ID: ${MINIMAX_VOICE_ID:-AnnaClone2026new}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      XSEARCH_ENDPOINT: ${XSEARCH_ENDPOINT:-}
      XSEARCH_API_TOKEN: ${XSEARCH_API_TOKEN:-}
      XSEARCH_TIMEOUT_SECONDS: ${XSEARCH_TIMEOUT_SECONDS:-240}
      VIKING_API_BASE: ${VIKING_API_BASE:-}
      VIKING_API_TOKEN: ${VIKING_API_TOKEN:-}
      VIKING_TIMEOUT_SECONDS: ${VIKING_TIMEOUT_SECONDS:-30}
    ports:
      - "${CORE_API_BIND_HOST:-127.0.0.1}:${CORE_API_PORT:-4100}:${CORE_API_PORT:-4100}"
    volumes:
      - core_api_data:/data
      - ${ASASHIKI_ARCHIVE_HOST_PATH:-/opt/asashiki/Asashiki_Archive}:/archive:rw
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4100/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  mcp-gateway:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: runtime
    command: ["pnpm", "--filter", "@asashiki/mcp-gateway", "start"]
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      MCP_GATEWAY_HOST: ${MCP_GATEWAY_HOST:-0.0.0.0}
      MCP_GATEWAY_PORT: ${MCP_GATEWAY_PORT:-4200}
      MCP_CORE_API_BASE_URL: ${MCP_CORE_API_BASE_URL:-http://core-api:4100}
      MCP_CORE_API_ADMIN_TOKEN: ${ADMIN_PANEL_TOKEN:-}
      MCP_PUBLIC_URL: ${MCP_PUBLIC_URL:-}
      MCP_AUTH_DB_PATH: ${MCP_AUTH_DB_PATH:-/data/mcp-auth.sqlite}
      MCP_OAUTH_SCOPE: ${MCP_OAUTH_SCOPE:-tools:read tools:write x:search}
    ports:
      - "${MCP_GATEWAY_BIND_HOST:-127.0.0.1}:${MCP_GATEWAY_PORT:-4200}:${MCP_GATEWAY_PORT:-4200}"
    volumes:
      - mcp_gateway_data:/data
    depends_on:
      core-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4200/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  core_api_data:
  mcp_gateway_data:
