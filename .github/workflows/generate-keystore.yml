name: Generate Android Keystore (run once)

on:
  workflow_dispatch:
    inputs:
      alias:
        description: 'Key alias'
        default: 'asashiki'
        required: true

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore release.jks \
            -alias ${{ inputs.alias }} \
            -keyalg RSA -keysize 2048 -validity 36500 \
            -storepass asashiki-store \
            -keypass asashiki-key \
            -dname "CN=Asashiki,O=Asashiki,C=CN"
          echo "=== KEYSTORE_BASE64 (copy to GitHub Secret) ==="
          base64 -w 0 release.jks
          echo ""
          echo "=== Secrets to add ==="
          echo "KEYSTORE_BASE64: (above base64 string)"
          echo "KEYSTORE_PASSWORD: asashiki-store"
          echo "KEY_ALIAS: ${{ inputs.alias }}"
          echo "KEY_PASSWORD: asashiki-key"
