name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/android-agent/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.11.1'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate app icon
        run: |
          sudo apt-get install -y imagemagick
          for size in 48 72 96 144 192; do
            case $size in
              48)  dpi=mdpi ;;
              72)  dpi=hdpi ;;
              96)  dpi=xhdpi ;;
              144) dpi=xxhdpi ;;
              192) dpi=xxxhdpi ;;
            esac
            mkdir -p apps/android-agent/app/src/main/res/mipmap-${dpi}
            convert apps/android-agent/app/src/main/ic_launcher_source.jpg \
              -resize ${size}x${size} \
              apps/android-agent/app/src/main/res/mipmap-${dpi}/ic_launcher.png
          done

      - name: Setup signing keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > apps/android-agent/release.jks

      - name: Build APK
        working-directory: apps/android-agent
        env:
          KEYSTORE_PATH: ${{ secrets.KEYSTORE_BASE64 != '' && '../release.jks' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          HAS_SIGNING: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          if [ "$HAS_SIGNING" = "true" ]; then
            gradle assembleRelease --no-daemon -PversionCode=${{ github.run_number }} \
              -PkeystorePath="$(pwd)/release.jks" \
              -PkeystorePassword="$KEYSTORE_PASSWORD" \
              -PkeyAlias="$KEY_ALIAS" \
              -PkeyPassword="$KEY_PASSWORD"
          else
            gradle assembleDebug --no-daemon -PversionCode=${{ github.run_number }}
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: asashiki-agent
          path: |
            apps/android-agent/app/build/outputs/apk/release/app-release.apk
            apps/android-agent/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
