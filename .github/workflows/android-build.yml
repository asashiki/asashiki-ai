name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/android-agent/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.11.1'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate app icon
        run: |
          sudo apt-get install -y imagemagick
          for size in 48 72 96 144 192; do
            case $size in
              48)  dpi=mdpi ;;
              72)  dpi=hdpi ;;
              96)  dpi=xhdpi ;;
              144) dpi=xxhdpi ;;
              192) dpi=xxxhdpi ;;
            esac
            mkdir -p apps/android-agent/app/src/main/res/mipmap-${dpi}
            convert apps/android-agent/app/src/main/ic_launcher_source.jpg \
              -resize ${size}x${size} \
              apps/android-agent/app/src/main/res/mipmap-${dpi}/ic_launcher.png
          done

      - name: Build debug APK
        working-directory: apps/android-agent
        run: gradle assembleDebug --no-daemon -PversionCode=${{ github.run_number }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: asashiki-agent-debug
          path: apps/android-agent/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
