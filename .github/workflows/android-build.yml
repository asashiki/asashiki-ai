name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/android-agent/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.11.1'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate app icon
        run: |
          sudo apt-get install -y imagemagick
          for size in 48 72 96 144 192; do
            case $size in
              48)  dpi=mdpi ;;
              72)  dpi=hdpi ;;
              96)  dpi=xhdpi ;;
              144) dpi=xxhdpi ;;
              192) dpi=xxxhdpi ;;
            esac
            mkdir -p apps/android-agent/app/src/main/res/mipmap-${dpi}
            convert apps/android-agent/app/src/main/ic_launcher_source.jpg \
              -resize ${size}x${size} \
              apps/android-agent/app/src/main/res/mipmap-${dpi}/ic_launcher.png
          done

      - name: Build APK
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.KEY_ALIAS }}
          KS_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: apps/android-agent
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            printf '%s' "$KEYSTORE_B64" | base64 -d > release.jks
            echo "Verifying keystore..."
            keytool -list -keystore release.jks -storepass "$KS_PASSWORD" -alias "$KS_ALIAS" -v 2>&1 | grep -E "Alias|Error|Exception|type:" || true
            # assembleRelease builds both full + lite flavors
            gradle assembleRelease --no-daemon \
              -PversionCode=${{ github.run_number }} \
              -PkeystorePath="$(pwd)/release.jks" \
              -PkeystorePassword="$KS_PASSWORD" \
              -PkeyAlias="$KS_ALIAS" \
              -PkeyPassword="$KS_KEY_PASSWORD"
          else
            gradle assembleDebug --no-daemon -PversionCode=${{ github.run_number }}
          fi

      - name: Upload phone APK (full)
        uses: actions/upload-artifact@v4
        with:
          name: asashiki-agent-full
          path: |
            apps/android-agent/app/build/outputs/apk/full/release/*.apk
            apps/android-agent/app/build/outputs/apk/full/debug/*.apk
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload tablet APK (lite)
        uses: actions/upload-artifact@v4
        with:
          name: asashiki-agent-lite
          path: |
            apps/android-agent/app/build/outputs/apk/lite/release/*.apk
            apps/android-agent/app/build/outputs/apk/lite/debug/*.apk
          retention-days: 30
          if-no-files-found: ignore
