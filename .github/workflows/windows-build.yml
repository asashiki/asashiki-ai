name: Build Windows Agent

on:
  push:
    branches: [main]
    paths:
      - 'apps/windows-agent/**'
      - 'apps/android-agent/app/src/main/ic_launcher_source.jpg'
      - '.github/workflows/windows-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Generate icon.ico from android source jpg
        shell: pwsh
        run: |
          # Convert the same JPG that android-agent uses into a multi-resolution ICO.
          # Use Magick (preinstalled on windows-latest as ImageMagick).
          $src = "apps/android-agent/app/src/main/ic_launcher_source.jpg"
          $dst = "apps/windows-agent/icon.ico"
          if (Test-Path $src) {
            magick "$src" -define icon:auto-resize="256,128,64,48,32,16" "$dst"
            Write-Host "Generated $dst"
          } else {
            Write-Warning "Source JPG not found at $src - icon.ico will be missing"
          }

      - name: Publish
        working-directory: apps/windows-agent
        run: >
          dotnet publish WindowsAgent.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: asashiki-windows-agent
          path: apps/windows-agent/publish/AsashikiWindowsAgent.exe
          retention-days: 30
